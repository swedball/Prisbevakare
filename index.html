<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisbevakare - Price Monitor</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0; 
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 { 
            color: #333;
            margin-top: 0;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 10px;
        }
        .config-section {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .config-section h2 {
            margin-top: 0;
            color: #555;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        label {
            font-weight: 500;
            color: #555;
            min-width: 120px;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            flex: 1;
            min-width: 150px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
        button {
            padding: 10px 16px;
            margin: 5px 5px 5px 0;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button.secondary {
            background-color: #2196F3;
        }
        button.secondary:hover {
            background-color: #0b7dda;
        }
        button.danger {
            background-color: #f44336;
            padding: 6px 12px;
            font-size: 13px;
        }
        button.danger:hover {
            background-color: #da190b;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .url-item {
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .url-item > div {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }
        .url-item label {
            min-width: auto;
            font-size: 12px;
            margin-bottom: 4px;
            display: block;
        }
        .url-item input {
            width: 100%;
            padding: 8px;
            font-size: 13px;
        }
        .urls-container {
            margin: 20px 0;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Prisbevakare - Price Monitor</h1>
        
        <div class="config-section">
            <h2>GitHub Configuration</h2>
            <div class="info-box">
                💡 Create a <a href="https://github.com/settings/tokens" target="_blank">GitHub Personal Access Token</a> with 'repo' scope to enable saving.
            </div>
            <div class="form-group">
                <label>GitHub Token:</label>
                <input type="password" id="token" placeholder="ghp_...">
            </div>
            <div class="form-group">
                <label>Repo Owner:</label>
                <input type="text" id="owner" value="swedball">
            </div>
            <div class="form-group">
                <label>Repo Name:</label>
                <input type="text" id="repo" value="Prisbevakare">
            </div>
            <div class="form-group">
                <label>Config File:</label>
                <input type="text" id="file" value="urls.json">
            </div>
            <button onclick="loadUrls()">📥 Load URLs from GitHub</button>
        </div>

        <div class="urls-container" id="urls-section" style="display:none;">
            <div class="config-section">
                <h2>Monitored URLs</h2>
                <div id="urls"></div>
                <div class="button-group">
                    <button onclick="addUrl()">➕ Add URL</button>
                    <button onclick="saveUrls()" class="secondary">💾 Save Changes</button>
                    <button onclick="sendReport()" class="secondary">📧 Send Report Now</button>
                </div>
            </div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        let urls = [];
        const apiBase = 'https://api.github.com';

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${isError ? 'error' : 'success'}`;
            setTimeout(() => {
                statusEl.className = 'status';
            }, 4000);
        }

        async function apiCall(endpoint, options = {}) {
            const token = document.getElementById('token').value;
            if (!token) {
                showStatus('Please enter GitHub token', true);
                return null;
            }
            options.headers = { ...options.headers, Authorization: `token ${token}` };
            try {
                const response = await fetch(`${apiBase}${endpoint}`, options);
                if (!response.ok) {
                    let error = `${response.status}`;
                    try {
                        const err = await response.json();
                        error = err.message || error;
                    } catch {}
                    showStatus(`Error: ${error}`, true);
                    return null;
                }
                return await response.json();
            } catch (err) {
                showStatus(`Network error: ${err.message}`, true);
                return null;
            }
        }

        async function loadUrls() {
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const file = document.getElementById('file').value;
            
            if (!owner || !repo || !file) {
                showStatus('Please fill in all configuration fields', true);
                return;
            }

            const data = await apiCall(`/repos/${owner}/${repo}/contents/${file}`);
            if (data && data.content) {
                try {
                    const content = atob(data.content);
                    urls = JSON.parse(content);
                    renderUrls();
                    document.getElementById('urls-section').style.display = 'block';
                    showStatus(`✅ Loaded ${urls.length} URL(s)`);
                } catch (err) {
                    showStatus(`Failed to parse config: ${err.message}`, true);
                }
            }
        }

        function renderUrls() {
            const container = document.getElementById('urls');
            if (urls.length === 0) {
                container.innerHTML = '<div class="empty-state">No URLs configured yet. Add one below!</div>';
                return;
            }
            
            container.innerHTML = '';
            urls.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'url-item';
                div.innerHTML = `
                    <div>
                        <label>URL:</label>
                        <input type="text" value="${escapeHtml(item.url)}" placeholder="https://..." onchange="updateUrl(${index}, 'url', this.value)">
                    </div>
                    <div>
                        <label>Email:</label>
                        <input type="email" value="${escapeHtml(item.email)}" onchange="updateUrl(${index}, 'email', this.value)">
                    </div>
                    <div>
                        <label>History File:</label>
                        <input type="text" value="${escapeHtml(item.history_path)}" placeholder="history/item.jsonl" onchange="updateUrl(${index}, 'history_path', this.value)">
                    </div>
                    <button class="danger" onclick="deleteUrl(${index})">🗑️ Delete</button>
                `;
                container.appendChild(div);
            });
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function updateUrl(index, field, value) {
            urls[index][field] = value;
        }

        function addUrl() {
            urls.push({ url: '', email: '', history_path: '' });
            renderUrls();
        }

        function deleteUrl(index) {
            if (confirm('Delete this URL?')) {
                urls.splice(index, 1);
                renderUrls();
            }
        }

        async function saveUrls() {
            // Validate
            for (let url of urls) {
                if (!url.url || !url.email || !url.history_path) {
                    showStatus('All fields are required for each URL', true);
                    return;
                }
            }

            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const file = document.getElementById('file').value;
            
            const content = btoa(JSON.stringify(urls, null, 2));
            const current = await apiCall(`/repos/${owner}/${repo}/contents/${file}`);
            if (!current) return;
            
            const update = await apiCall(`/repos/${owner}/${repo}/contents/${file}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Update URLs config',
                    content: content,
                    sha: current.sha
                })
            });
            if (update) {
                showStatus('✅ Configuration saved to GitHub');
            }
        }

        function sendReport() {
            alert('To send immediate email reports:\n\n1. Ensure SMTP is configured on your server\n2. Run: python price_checker.py send-report urls.json\n\nOr use a cron job:\n0 * * * * python price_checker.py send-report urls.json');
        }
    </script>
</body>
</html>
