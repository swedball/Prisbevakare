name: Price Checker Daily

on:
  schedule:
    - cron: '0 1 * * *'  # every day at 01:00 UTC
  workflow_dispatch: {}

jobs:
  check_price:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - id: run_price_checker
        name: Run price checker
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python price_checker.py check \
            "https://www.rugvista.se/p/serafina-100x450-cm-avlang-beige-extra-stor-ullmatta-CVD27082" \
            "price_history.jsonl" \
            "henrikadolfsson@gmail.com"

      - name: Commit history update
        if: steps.run_price_checker.outcome == 'success'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add price_history.jsonl
          git diff --cached --quiet || (
            git commit -m 'Update price history' &&
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
